name: Publish Helm Chart

on:
  release:
    types: [published]

env:
  CHART_PATH: charts/amnezia
  ANDREYWTF_REGISTRY_HOST: registry.andrey.wtf
  REGISTRY_REPO: charts

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install GnuPG
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Import signing key
        run: |
          echo "${ANDREYWTF_GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --pinentry-mode loopback --passphrase "${ANDREYWTF_GPG_PASSPHRASE}" \
            --export-secret-keys --output ./helm-secret.gpg "${ANDREYWTF_GPG_KEY_ID}"
          HELM_SIGNING_KEY="$(gpg --batch --list-secret-keys --with-colons "${ANDREYWTF_GPG_KEY_ID}" | awk -F: '/^uid:/ {print $10; exit}')"
          if [ -z "${HELM_SIGNING_KEY}" ]; then
            echo "Failed to resolve signing key UID from imported secret key." >&2
            exit 1
          fi
          echo "HELM_SIGNING_KEY=${HELM_SIGNING_KEY}" >> "$GITHUB_ENV"
        env:
          ANDREYWTF_GPG_PRIVATE_KEY: ${{ secrets.ANDREYWTF_GPG_PRIVATE_KEY }}
          ANDREYWTF_GPG_KEY_ID: ${{ secrets.ANDREYWTF_GPG_KEY_ID }}
          ANDREYWTF_GPG_PASSPHRASE: ${{ secrets.ANDREYWTF_GPG_PASSPHRASE }}

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          helm lint "${CHART_PATH}"
          printf '%s' "${ANDREYWTF_GPG_PASSPHRASE}" > /tmp/.gpg-passphrase
          helm package "${CHART_PATH}" \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --sign \
            --key "${HELM_SIGNING_KEY}" \
            --keyring ./helm-secret.gpg \
            --passphrase-file /tmp/.gpg-passphrase \
            --destination dist
          rm -f /tmp/.gpg-passphrase
        env:
          ANDREYWTF_GPG_PASSPHRASE: ${{ secrets.ANDREYWTF_GPG_PASSPHRASE }}

      - name: Log in to registry
        run: |
          echo "${ANDREYWTF_REGISTRY_PASSWORD}" | helm registry login "${ANDREYWTF_REGISTRY_HOST}" \
            --username "${ANDREYWTF_REGISTRY_USERNAME}" \
            --password-stdin
        env:
          ANDREYWTF_REGISTRY_USERNAME: ${{ secrets.ANDREYWTF_REGISTRY_USERNAME }}
          ANDREYWTF_REGISTRY_PASSWORD: ${{ secrets.ANDREYWTF_REGISTRY_PASSWORD }}

      - name: Push chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm push "dist/amnezia-${VERSION}.tgz" \
            "oci://${ANDREYWTF_REGISTRY_HOST}/${REGISTRY_REPO}"
